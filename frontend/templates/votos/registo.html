{% extends 'votos/base.html' %}
{% load django_bootstrap5 %}

{% block title %}Registo - Sistema de Votos{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card p-4 shadow-lg border-0">
            <div class="text-center mb-4">
                <i class="bi bi-person-plus fs-1 text-primary"></i>
                <h2 class="fw-bold mt-2">Criar conta</h2>
                <p class="text-muted small">Junte-se à nossa comunidade de votação</p>
            </div>
            <form method="post" id="registo-form">
                {% csrf_token %}
                {% bootstrap_form form %}
                <div class="d-grid mt-4">
                    <button type="submit" class="btn btn-primary btn-lg rounded-pill shadow">Registar</button>
                </div>
            </form>

            <style>
                /* Ocultar informações de senha por padrão */
                #registo-form .helptext,
                #registo-form .form-text {
                    display: none;
                    font-size: 0.85rem;
                    color: #6c757d;
                    margin-top: 0.25rem;
                }

                /* Mostrar quando houver erro ou quando focado */
                #registo-form .is-invalid~.form-text,
                #registo-form .has-error .form-text {
                    display: block !important;
                    color: #dc3545;
                }
            </style>

            <script>
                document.addEventListener('DOMContentLoaded', function () {
                    const passwordInputs = document.querySelectorAll('input[type="password"]');
                    passwordInputs.forEach(input => {
                        input.addEventListener('input', function () {
                            const helpText = this.closest('.mb-3').querySelector('.form-text');
                            if (helpText) {
                                // Mostra apenas se a senha for curta (insegura)
                                if (this.value.length > 0 && this.value.length < 8) {
                                    helpText.style.display = 'block';
                                } else if (!this.classList.contains('is-invalid')) {
                                    helpText.style.display = 'none';
                                }
                            }
                        });
                        // Também mostra ao focar se estiver vazio para guiar o usuário
                        input.addEventListener('focus', function () {
                            const helpText = this.closest('.mb-3').querySelector('.form-text');
                            if (helpText && this.value.length === 0) helpText.style.display = 'block';
                        });
                    });
                });
            </script>
            <hr class="my-4">
            <p class="text-center mb-0">
                <span class="text-muted">Já tem conta?</span>
                <a href="{% url 'login' %}" class="text-decoration-none fw-bold">Entrar aqui</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
