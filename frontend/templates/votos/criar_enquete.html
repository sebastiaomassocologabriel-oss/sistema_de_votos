{% extends 'votos/base.html' %}
{% load django_bootstrap5 %}

{% block title %}Criar Enquete - Admin{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card p-4 shadow-lg border-0">
            <div class="text-center mb-4">
                <i class="bi bi-plus-circle fs-1 text-primary"></i>
                <h2 class="fw-bold mt-2">Nova Enquete</h2>
                <p class="text-muted small">Configure as opções para a comunidade</p>
            </div>
            <form method="post">
                {% csrf_token %}
                {% bootstrap_form form %}
                <div class="d-grid gap-2 mt-4">
                    <button type="submit" class="btn btn-primary btn-lg rounded-pill shadow">
                        Publicar Enquete
                    </button>
                    <a href="{% url 'lista_enquetes' %}" class="btn btn-outline-secondary rounded-pill">
                        Voltar
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
